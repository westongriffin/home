<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Onboarding Orchestrator — NewWesVentures</title>
<style>
  :root{
    --ink:#0c1020; --ink2:#3a4560; --muted:#6b7794; --line:#e7e9f2;
    --bg:#f7f8fc; --card:#ffffff;
    --v1:#7c3aed; --v2:#5b4ef0; --v3:#06b6d4; --pink:#db2777;
    --green:#10b981; --red:#ef4444; --amber:#f59e0b;
    --grad:linear-gradient(110deg,#7c3aed,#5b4ef0 45%,#06b6d4);
    --shadow-sm:0 1px 2px rgba(12,16,32,.06),0 1px 3px rgba(12,16,32,.05);
    --shadow-md:0 6px 18px rgba(12,16,32,.08),0 2px 6px rgba(12,16,32,.05);
    --shadow-lg:0 18px 50px rgba(12,16,32,.16);
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;height:100%;}
  body{
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Inter,Helvetica,Arial,sans-serif;
    background:var(--bg); color:var(--ink);
    -webkit-font-smoothing:antialiased; text-rendering:optimizeLegibility;
    font-size:14px; line-height:1.45;
  }
  button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit;}
  ::-webkit-scrollbar{width:10px;height:10px;}
  ::-webkit-scrollbar-thumb{background:#d6dae8;border-radius:8px;border:2px solid var(--bg);}
  ::-webkit-scrollbar-thumb:hover{background:#c4c9dd;}

  /* ============ APP SHELL ============ */
  .app{display:flex;flex-direction:column;height:100vh;min-height:520px;overflow:hidden;}

  /* ---- Top bar ---- */
  .topbar{
    display:flex;align-items:center;gap:14px;
    padding:11px 20px;background:var(--card);
    border-bottom:1px solid var(--line);
    box-shadow:var(--shadow-sm);z-index:30;flex:none;
  }
  .brand{display:flex;align-items:center;gap:11px;min-width:0;}
  .logo{
    width:34px;height:34px;border-radius:10px;background:var(--grad);
    display:flex;align-items:center;justify-content:center;flex:none;
    box-shadow:0 4px 12px rgba(91,78,240,.35);position:relative;overflow:hidden;
  }
  .logo svg{width:20px;height:20px;display:block;}
  .brand-txt{display:flex;flex-direction:column;line-height:1.15;min-width:0;}
  .brand-txt .t1{font-weight:700;font-size:14.5px;letter-spacing:-.2px;white-space:nowrap;}
  .brand-txt .t2{font-size:11px;color:var(--muted);font-weight:500;white-space:nowrap;}
  .demo-badge{
    display:inline-flex;align-items:center;gap:6px;
    font-size:11px;font-weight:600;color:var(--v2);
    background:rgba(124,58,237,.09);border:1px solid rgba(124,58,237,.18);
    padding:4px 10px;border-radius:999px;white-space:nowrap;
  }
  .demo-badge .dot{width:6px;height:6px;border-radius:50%;background:var(--v1);
    box-shadow:0 0 0 0 rgba(124,58,237,.5);animation:pulse 2.4s infinite;}
  @keyframes pulse{0%{box-shadow:0 0 0 0 rgba(124,58,237,.45);}70%{box-shadow:0 0 0 6px rgba(124,58,237,0);}100%{box-shadow:0 0 0 0 rgba(124,58,237,0);}}
  .spacer{flex:1;}
  .user-chip{
    display:flex;align-items:center;gap:9px;padding:5px 11px 5px 6px;
    background:var(--bg);border:1px solid var(--line);border-radius:999px;white-space:nowrap;
  }
  .avatar{
    width:28px;height:28px;border-radius:50%;flex:none;
    background:linear-gradient(135deg,#7c3aed,#06b6d4);
    color:#fff;font-weight:700;font-size:12px;
    display:flex;align-items:center;justify-content:center;
  }
  .user-chip .u-name{font-weight:650;font-size:12.5px;line-height:1.1;}
  .user-chip .u-org{font-size:10.5px;color:var(--muted);line-height:1.1;}

  /* ---- Body layout ---- */
  .body{display:flex;flex:1;min-height:0;}

  /* ============ LEFT: hires ============ */
  .left{
    width:288px;flex:none;background:var(--card);
    border-right:1px solid var(--line);
    display:flex;flex-direction:column;min-height:0;
  }
  .left-head{padding:16px 18px 10px;}
  .left-head .eyebrow{font-size:10.5px;font-weight:700;letter-spacing:.7px;text-transform:uppercase;color:var(--muted);}
  .left-head h2{margin:3px 0 0;font-size:16px;letter-spacing:-.3px;}
  .left-head .sub{font-size:12px;color:var(--muted);margin-top:2px;}
  .hire-list{flex:1;overflow-y:auto;padding:4px 12px 14px;}
  .hire{
    display:flex;align-items:center;gap:12px;
    padding:11px 12px;border-radius:13px;margin-bottom:7px;
    border:1px solid transparent;cursor:pointer;position:relative;
    transition:background .15s ease,border-color .15s ease,box-shadow .15s ease,transform .12s ease;
  }
  .hire:hover{background:var(--bg);}
  .hire.active{background:#fff;border-color:rgba(124,58,237,.32);box-shadow:var(--shadow-md);}
  .hire.active::before{
    content:"";position:absolute;left:0;top:12px;bottom:12px;width:3.5px;border-radius:3px;
    background:var(--grad);
  }
  .h-av{
    width:40px;height:40px;border-radius:12px;flex:none;
    display:flex;align-items:center;justify-content:center;
    color:#fff;font-weight:700;font-size:14px;letter-spacing:.3px;
  }
  .h-main{flex:1;min-width:0;}
  .h-name{font-weight:680;font-size:13.5px;letter-spacing:-.1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .h-role{font-size:11.5px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .h-start{font-size:11px;color:var(--ink2);margin-top:3px;display:flex;align-items:center;gap:5px;}
  .h-start .cal{font-size:10px;}
  .h-start.soon{color:var(--pink);font-weight:600;}
  .h-start.empty{color:var(--amber);font-weight:600;}
  /* readiness ring */
  .ring{position:relative;width:38px;height:38px;flex:none;}
  .ring svg{transform:rotate(-90deg);display:block;}
  .ring .track{stroke:var(--line);}
  .ring .prog{stroke-linecap:round;transition:stroke-dashoffset .8s cubic-bezier(.22,1,.36,.32),stroke .4s;}
  .ring .pct{
    position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
    font-size:10.5px;font-weight:750;color:var(--ink);
  }
  .ring.empty .pct{color:var(--amber);font-size:14px;}

  /* ============ CENTER: plan ============ */
  .center{flex:1;min-width:0;display:flex;flex-direction:column;overflow:hidden;}
  .plan-head{
    padding:16px 22px 14px;background:var(--card);border-bottom:1px solid var(--line);
    display:flex;align-items:center;gap:20px;flex:none;z-index:5;
  }
  .ph-gauge{flex:none;position:relative;width:78px;height:78px;}
  .ph-gauge svg{transform:rotate(-90deg);display:block;}
  .ph-gauge .g-track{stroke:var(--line);}
  .ph-gauge .g-prog{stroke-linecap:round;transition:stroke-dashoffset .9s cubic-bezier(.22,1,.36,.32),stroke .4s;}
  .ph-gauge .g-center{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;line-height:1;}
  .ph-gauge .g-num{font-size:21px;font-weight:800;letter-spacing:-.5px;}
  .ph-gauge .g-lbl{font-size:8.5px;font-weight:700;letter-spacing:.6px;text-transform:uppercase;color:var(--muted);margin-top:2px;}
  .ph-info{flex:1;min-width:0;}
  .ph-info .nm{font-size:19px;font-weight:750;letter-spacing:-.4px;display:flex;align-items:center;gap:10px;flex-wrap:wrap;}
  .ph-info .role{font-size:13px;color:var(--ink2);margin-top:1px;}
  .ph-meta{display:flex;gap:8px;margin-top:11px;flex-wrap:wrap;}
  .pill{
    display:inline-flex;align-items:center;gap:6px;font-size:11.5px;font-weight:600;
    padding:5px 11px;border-radius:999px;background:var(--bg);border:1px solid var(--line);color:var(--ink2);
  }
  .pill .pi{font-size:12px;}
  .pill.ready{background:rgba(16,185,129,.1);border-color:rgba(16,185,129,.28);color:#0a7d5b;}
  .pill.soon{background:rgba(219,39,119,.09);border-color:rgba(219,39,119,.22);color:var(--pink);}
  .pill.warn{background:rgba(245,158,11,.12);border-color:rgba(245,158,11,.3);color:#b9770c;}
  .ph-actions{flex:none;display:flex;flex-direction:column;align-items:flex-end;gap:7px;}
  .tasks-summary{font-size:11.5px;color:var(--muted);text-align:right;}
  .tasks-summary b{color:var(--ink);font-weight:700;}

  .lanes-wrap{flex:1;overflow:auto;padding:18px 22px 26px;}
  .lanes{display:grid;grid-template-columns:repeat(5,minmax(208px,1fr));gap:14px;min-width:1040px;}
  .lane{display:flex;flex-direction:column;min-width:0;}
  .lane-head{
    display:flex;align-items:center;gap:9px;padding:2px 4px 11px;position:sticky;top:0;
  }
  .lane-ic{
    width:30px;height:30px;border-radius:9px;flex:none;color:#fff;
    display:flex;align-items:center;justify-content:center;font-size:15px;
    box-shadow:var(--shadow-sm);
  }
  .lane-title{font-weight:700;font-size:13.5px;letter-spacing:-.2px;flex:1;min-width:0;}
  .lane-count{
    font-size:10.5px;font-weight:700;color:var(--muted);
    background:var(--bg);border:1px solid var(--line);border-radius:999px;padding:2px 8px;flex:none;
  }
  .lane-body{display:flex;flex-direction:column;gap:9px;}
  .lane-empty{
    border:1.5px dashed var(--line);border-radius:13px;padding:18px 12px;text-align:center;
    color:var(--muted);font-size:11.5px;background:rgba(247,248,252,.6);
  }

  .task{
    background:var(--card);border:1px solid var(--line);border-radius:13px;
    padding:11px 12px 11px 13px;box-shadow:var(--shadow-sm);position:relative;
    cursor:pointer;transition:box-shadow .16s ease,transform .12s ease,border-color .16s,background .2s;
    overflow:hidden;
  }
  .task:hover{box-shadow:var(--shadow-md);transform:translateY(-1px);border-color:#dfe2ee;}
  .task::before{content:"";position:absolute;left:0;top:0;bottom:0;width:3px;background:transparent;transition:background .2s;}
  .task.s-done::before{background:var(--green);}
  .task.s-progress::before{background:var(--v2);}
  .task.s-scheduled::before{background:var(--amber);}
  .task.s-blocked::before{background:var(--red);}
  .task.s-nudged::before{background:var(--v3);}
  .task-top{display:flex;align-items:flex-start;gap:9px;}
  .check{
    width:19px;height:19px;border-radius:6px;flex:none;margin-top:1px;
    border:1.8px solid #cfd4e6;background:#fff;position:relative;transition:all .18s ease;
    display:flex;align-items:center;justify-content:center;
  }
  .check svg{width:12px;height:12px;opacity:0;transform:scale(.4);transition:opacity .18s,transform .18s;stroke:#fff;}
  .task.s-done .check{background:var(--green);border-color:var(--green);}
  .task.s-done .check svg{opacity:1;transform:scale(1);}
  .task-name{font-size:12.5px;font-weight:620;line-height:1.32;flex:1;letter-spacing:-.1px;}
  .task.s-done .task-name{color:var(--muted);text-decoration:line-through;text-decoration-color:rgba(107,119,148,.5);}
  .task-sub{font-size:11px;color:var(--muted);margin-top:5px;margin-left:28px;display:flex;align-items:center;gap:6px;flex-wrap:wrap;}
  .owner{display:inline-flex;align-items:center;gap:5px;}
  .owner .od{width:5px;height:5px;border-radius:50%;background:var(--v2);}

  .chip{
    display:inline-flex;align-items:center;gap:5px;font-size:10.5px;font-weight:700;
    padding:3px 9px;border-radius:999px;margin-left:28px;margin-top:8px;
    letter-spacing:.1px;
  }
  .chip .cd{width:6px;height:6px;border-radius:50%;}
  .chip.c-done{background:rgba(16,185,129,.12);color:#0a7d5b;}
  .chip.c-done .cd{background:var(--green);}
  .chip.c-progress{background:rgba(91,78,240,.1);color:var(--v2);}
  .chip.c-progress .cd{background:var(--v2);animation:blink 1.6s infinite;}
  .chip.c-scheduled{background:rgba(245,158,11,.13);color:#b9770c;}
  .chip.c-scheduled .cd{background:var(--amber);}
  .chip.c-blocked{background:rgba(239,68,68,.11);color:#c5303a;}
  .chip.c-blocked .cd{background:var(--red);}
  .chip.c-nudged{background:rgba(6,182,212,.13);color:#0883a0;}
  .chip.c-nudged .cd{background:var(--v3);}
  @keyframes blink{0%,100%{opacity:1;}50%{opacity:.35;}}

  .nudge-btn{
    margin:9px 0 1px 28px;display:inline-flex;align-items:center;gap:6px;
    font-size:11px;font-weight:700;color:#fff;
    background:linear-gradient(120deg,#ef4444,#db2777);
    padding:6px 12px;border-radius:9px;box-shadow:0 4px 10px rgba(219,39,119,.28);
    transition:transform .12s,box-shadow .15s,filter .15s;
  }
  .nudge-btn:hover{transform:translateY(-1px);filter:brightness(1.05);box-shadow:0 6px 14px rgba(219,39,119,.35);}
  .nudge-btn:active{transform:translateY(0);}

  /* fly-in animation for generated tasks */
  .task.fly{opacity:0;transform:translateY(14px) scale(.96);}
  .task.fly-in{opacity:1;transform:translateY(0) scale(1);
    transition:opacity .5s cubic-bezier(.22,1,.36,1),transform .5s cubic-bezier(.22,1,.36,1);}

  /* burst when a task is completed */
  .task.burst{animation:burst .42s ease;}
  @keyframes burst{0%{box-shadow:0 0 0 0 rgba(16,185,129,.4);}100%{box-shadow:0 0 0 12px rgba(16,185,129,0);}}

  /* ============ EMPTY-PLAN STATE ============ */
  .empty-state{
    flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
    text-align:center;padding:30px;gap:6px;
  }
  .empty-state .ico{
    width:78px;height:78px;border-radius:22px;background:linear-gradient(135deg,rgba(124,58,237,.12),rgba(6,182,212,.12));
    border:1px solid rgba(124,58,237,.2);display:flex;align-items:center;justify-content:center;
    font-size:36px;margin-bottom:8px;
  }
  .empty-state h3{margin:0;font-size:18px;letter-spacing:-.3px;}
  .empty-state p{margin:0;color:var(--muted);max-width:380px;font-size:13px;}
  .gen-btn{
    margin-top:14px;display:inline-flex;align-items:center;gap:9px;
    font-size:14px;font-weight:700;color:#fff;background:var(--grad);
    padding:13px 22px;border-radius:13px;box-shadow:0 10px 26px rgba(91,78,240,.38);
    transition:transform .14s,box-shadow .18s,filter .18s;letter-spacing:-.1px;
  }
  .gen-btn:hover{transform:translateY(-2px);box-shadow:0 14px 32px rgba(91,78,240,.46);filter:brightness(1.04);}
  .gen-btn:active{transform:translateY(0);}
  .gen-btn.busy{pointer-events:none;opacity:.92;}
  .gen-btn .sp{
    width:15px;height:15px;border-radius:50%;border:2.4px solid rgba(255,255,255,.4);
    border-top-color:#fff;animation:spin .7s linear infinite;display:none;
  }
  .gen-btn.busy .sp{display:block;}
  .gen-btn.busy .spark{display:none;}
  @keyframes spin{to{transform:rotate(360deg);}}

  .header-gen{
    display:inline-flex;align-items:center;gap:8px;
    font-size:12.5px;font-weight:700;color:#fff;background:var(--grad);
    padding:9px 15px;border-radius:11px;box-shadow:0 6px 16px rgba(91,78,240,.32);
    transition:transform .14s,box-shadow .16s,filter .16s;
  }
  .header-gen:hover{transform:translateY(-1px);filter:brightness(1.05);box-shadow:0 9px 20px rgba(91,78,240,.4);}

  /* ============ TOAST ============ */
  .toasts{position:fixed;right:20px;bottom:20px;display:flex;flex-direction:column;gap:10px;z-index:80;align-items:flex-end;}
  .toast{
    display:flex;align-items:center;gap:11px;background:var(--ink);color:#fff;
    padding:12px 16px 12px 13px;border-radius:13px;box-shadow:var(--shadow-lg);
    font-size:13px;font-weight:550;max-width:340px;
    opacity:0;transform:translateY(12px) scale(.97);
    transition:opacity .3s ease,transform .3s cubic-bezier(.22,1,.36,1);
  }
  .toast.show{opacity:1;transform:translateY(0) scale(1);}
  .toast .ti{
    width:26px;height:26px;border-radius:8px;flex:none;display:flex;align-items:center;justify-content:center;font-size:14px;
    background:linear-gradient(135deg,#7c3aed,#06b6d4);
  }
  .toast .tx b{font-weight:750;}
  .toast .tx .sm{font-size:11px;opacity:.7;font-weight:500;}

  /* byline */
  .byline{
    position:fixed;left:16px;bottom:11px;font-size:10.5px;color:var(--muted);
    background:rgba(255,255,255,.7);backdrop-filter:blur(4px);
    padding:4px 11px;border-radius:999px;border:1px solid var(--line);
    pointer-events:none;z-index:60;
  }

  /* responsive */
  @media (max-width:980px){
    .left{width:248px;}
    .plan-head{flex-wrap:wrap;}
    .ph-actions{align-items:flex-start;width:100%;flex-direction:row;justify-content:space-between;}
  }
  @media (max-width:820px){
    .left{width:218px;}
    .brand-txt .t2{display:none;}
    .user-chip .u-org{display:none;}
    .ph-gauge{width:66px;height:66px;}
  }
  @media (max-width:760px){
    .demo-badge span.lbl{display:none;}
  }

  .fade-swap{animation:fadeSwap .32s ease;}
  @keyframes fadeSwap{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:none;}}

  /* ============================================================
     MOBILE / PHONE LAYER  (≤760px)  — does not affect ≥820px
     - page scrolls vertically (no fixed 100vh / overflow:hidden)
     - single column: hire list becomes a horizontal chip row ABOVE the plan
     - the five swimlanes stack VERTICALLY, each full-width
     - app bar wraps so title + DEMO badge + user chip stay tappable
     ============================================================ */
  @media (max-width:760px){
    html,body{height:auto;min-height:100%;}
    /* let the whole page scroll; release the desktop's locked 100vh shell */
    .app{height:auto;min-height:100vh;overflow:visible;}
    .body{flex-direction:column;flex:1 1 auto;min-height:0;}

    /* ---- top bar wraps, nothing clipped ---- */
    .topbar{
      flex-wrap:wrap;gap:10px 12px;padding:10px 14px;
      position:sticky;top:0;
    }
    .brand{flex:1 1 auto;min-width:0;}
    .brand-txt .t1{font-size:14px;white-space:normal;}
    .brand-txt .t2{display:none;}
    .spacer{display:none;}                 /* no flexible gap when wrapping */
    .demo-badge{order:3;}
    .user-chip{order:2;margin-left:auto;}  /* keep chip on the top row, right side */
    .user-chip .u-org{display:none;}

    /* ---- LEFT becomes a horizontal scrolling row of hire chips ABOVE plan ---- */
    .left{
      width:auto;flex:none;
      border-right:none;border-bottom:1px solid var(--line);
    }
    .left-head{padding:12px 14px 8px;}
    .left-head h2{font-size:15px;}
    .hire-list{
      flex:none;overflow-x:auto;overflow-y:hidden;
      display:flex;gap:10px;
      padding:2px 14px 14px;
      -webkit-overflow-scrolling:touch;scroll-snap-type:x proximity;
    }
    .hire{
      flex:0 0 auto;width:240px;margin-bottom:0;
      scroll-snap-align:start;padding:11px 12px;
    }
    .hire.active::before{top:11px;bottom:11px;}

    /* ---- CENTER / plan uses full width, scrolls with the page ---- */
    .center{flex:none;overflow:visible;}
    .plan-head{
      padding:14px 14px 14px;gap:14px;
      flex-wrap:wrap;position:static;
    }
    .ph-gauge{width:64px;height:64px;}
    .ph-info{flex:1 1 180px;}
    .ph-info .nm{font-size:18px;}
    .ph-actions{align-items:flex-start;width:100%;flex-direction:row;justify-content:flex-start;}

    /* the board no longer scrolls internally; it grows down the page */
    .lanes-wrap{flex:none;overflow:visible;padding:14px 14px 90px;}
    /* STACK the five swimlanes vertically, each full width */
    .lanes{
      display:flex;flex-direction:column;gap:18px;
      min-width:0;width:100%;
    }
    .lane{width:100%;}
    .lane-head{
      position:static;padding:2px 2px 10px;
      border-bottom:1px solid var(--line);margin-bottom:2px;
    }
    .lane-ic{width:34px;height:34px;}      /* ≥40px combined tap row */
    .lane-title{font-size:14.5px;}
    .lane-count{font-size:11px;padding:3px 9px;}
    .lane-body{gap:10px;}

    /* roomier tap targets on cards */
    .task{padding:13px 13px 13px 15px;}
    .check{width:22px;height:22px;}
    .task-name{font-size:13px;}
    .nudge-btn{padding:9px 14px;font-size:11.5px;}

    /* toasts span the width nicely on a phone */
    .toasts{right:12px;left:12px;bottom:14px;align-items:stretch;}
    .toast{max-width:none;}
    .byline{display:none;}
  }

  /* ---- very narrow phones (≤430px) ---- */
  @media (max-width:430px){
    .topbar{padding:9px 12px;}
    .brand-txt .t1{font-size:13.5px;}
    .user-chip{padding:5px 10px 5px 5px;}
    .user-chip .u-name{font-size:12px;}
    .hire{width:84vw;}                      /* nearly full-width chips */
    .ph-info .nm{font-size:17px;}
    .ph-meta .pill{font-size:11px;}
    .lanes-wrap{padding:12px 12px 90px;}
  }
</style>
</head>
<body>
<div class="app" id="app">
  <!-- ===== TOP BAR ===== -->
  <header class="topbar">
    <div class="brand">

<script>
(function(){

  /* ---------- safe helpers ---------- */

  }
  function esc(s){ return String(s==null?"":s).replace(/[&<>"]/g,function(c){return {"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c];}); }

  /* ---------- task id ---------- */
  var _tid=0; function nextId(){ return "t"+(++_tid); }
  function T(lane,name,status,sub){ return {id:nextId(),lane:lane,name:name,status:status,sub:sub||""}; }

  /* ---------- avatar colors ---------- */
  function avColor(seed){
    var palette=[
      "linear-gradient(135deg,#7c3aed,#5b4ef0)",
      "linear-gradient(135deg,#06b6d4,#0ea5b7)",
      "linear-gradient(135deg,#db2777,#f43f6e)",
      "linear-gradient(135deg,#f59e0b,#f97316)",
      "linear-gradient(135deg,#5b4ef0,#06b6d4)"
    ];
    return palette[seed % palette.length];
  }
  function initials(name){
    var p=name.trim().split(/\s+/);
    return ((p[0]||"")[0]||"")+((p[1]||"")[0]||"");
  }

  /* ---------- a realistic full plan generator ---------- */

      ]

  ];

  /* ---------- state ---------- */
  var state = { selectedId:"h1" };

  /* ---------- readiness math ---------- */
  function weightFor(s){
    // partial credit so the gauge feels alive
    if(s==="done") return 1;
    if(s==="progress") return 0.5;
    if(s==="nudged") return 0.25;
    if(s==="scheduled") return 0.15;
    return 0; // blocked
  }
  function readiness(h){
    if(!h.tasks.length) return 0;
    var sum=0; h.tasks.forEach(function(t){ sum+=weightFor(t.status); });
    return Math.round((sum/h.tasks.length)*100);
  }
  function laneStats(h, laneKey){
    var total=0, done=0;
    h.tasks.forEach(function(t){ if(t.lane===laneKey){ total++; if(t.status==="done") done++; } });
    return {total:total, done:done};
  }
  function countByStatus(h){
    var c={done:0,progress:0,scheduled:0,blocked:0,nudged:0};
    h.tasks.forEach(function(t){ if(c[t.status]!=null) c[t.status]++; });
    return c;
  }

  function getHire(id){ for(var i=0;i<HIRES.length;i++) if(HIRES[i].id===id) return HIRES[i]; return null; }

  /* ---------- ring svg builder ---------- */
  function ringSVG(pct, r, sw, klass){
    var C=2*Math.PI*r;
    var off=C*(1-clamp(pct,0,100)/100);
    var stroke = pct>=85 ? "var(--green)" : pct>=55 ? "var(--v2)" : pct>=30 ? "var(--amber)" : "var(--red)";
    var size=(r+sw)*2;
    return '<svg width="'+size+'" height="'+size+'" viewBox="0 0 '+size+' '+size+'">'+
      '<circle class="track" cx="'+(size/2)+'" cy="'+(size/2)+'" r="'+r+'" fill="none" stroke-width="'+sw+'"/>'+
      '<circle class="'+klass+'" cx="'+(size/2)+'" cy="'+(size/2)+'" r="'+r+'" fill="none" stroke="'+stroke+'" stroke-width="'+sw+'" stroke-dasharray="'+C.toFixed(1)+'" stroke-dashoffset="'+off.toFixed(1)+'"/>'+
      '</svg>';
  }

  /* ============ RENDER LEFT LIST ============ */
  function renderHires(){
    var list=document.getElementById("hireList");
    if(!list) return;
    list.innerHTML="";
    HIRES.forEach(function(h){
      var pct=readiness(h);
      var empty=h.tasks.length===0;
      var row=el("div","hire"+(h.id===state.selectedId?" active":""));
      row.setAttribute("role","button");
      row.setAttribute("tabindex","0");
      row.dataset.id=h.id;

      var av=el("div","h-av");
      av.style.background=avColor(h.seed);
      av.textContent=initials(h.name).toUpperCase();

      var main=el("div","h-main");
      var startCls = empty ? "empty" : (h.startInDays<=7 ? "soon":"");
      var startTxt = empty
        ? "⚠ No plan yet"
        : "Starts in "+h.startInDays+" day"+(h.startInDays===1?"":"s");
      main.innerHTML =
        '<div class="h-name">'+esc(h.name)+'</div>'+
        '<div class="h-role">'+esc(h.role)+'</div>'+
        '<div class="h-start '+startCls+'"><span class="cal">'+(empty?"":"📅")+'</span>'+esc(startTxt)+'</div>';

      var ring=el("div","ring"+(empty?" empty":""));
      ring.innerHTML = ringSVG(pct,15,3.5,"prog")+'<div class="pct">'+(empty?"–":pct+"%")+'</div>';

      row.appendChild(av);
      row.appendChild(main);
      row.appendChild(ring);

      row.addEventListener("click",function(){ selectHire(h.id); });
      row.addEventListener("keydown",function(e){ if(e.key==="Enter"||e.key===" "){ e.preventDefault(); selectHire(h.id); } });

      list.appendChild(row);
    });
  }

  /* update just one hire's ring (after a toggle) without full re-render */
  function updateHireRing(h){
    var row=document.querySelector('.hire[data-id="'+h.id+'"]');
    if(!row) return;
    var pct=readiness(h);
    var ring=row.querySelector(".ring");
    if(ring){
      ring.classList.toggle("empty", h.tasks.length===0);
      ring.innerHTML = ringSVG(pct,15,3.5,"prog")+'<div class="pct">'+(h.tasks.length===0?"–":pct+"%")+'</div>';
    }
    var startEl=row.querySelector(".h-start");
    if(startEl && h.tasks.length>0 && startEl.classList.contains("empty")){
      startEl.classList.remove("empty");
      startEl.classList.toggle("soon", h.startInDays<=7);
      startEl.innerHTML='<span class="cal">📅</span>Starts in '+h.startInDays+' day'+(h.startInDays===1?"":"s");
    }
  }

  /* ============ RENDER CENTER ============ */
  function selectHire(id){
    state.selectedId=id;
    renderHires();
    renderCenter(true);
  }

  function renderCenter(animate){
    var center=document.getElementById("center");
    if(!center) return;
    var h=getHire(state.selectedId);
    if(!h){ center.innerHTML=""; return; }

    if(h.tasks.length===0){
      renderEmptyState(center,h);
      return;
    }

    center.innerHTML="";
    var head=buildPlanHead(h);
    var wrap=el("div","lanes-wrap"+(animate?" fade-swap":""));
    var lanes=el("div","lanes");

    LANES.forEach(function(L){
      var laneTasks=h.tasks.filter(function(t){return t.lane===L.key;});
      var lane=el("div","lane");
      var st=laneStats(h,L.key);

      var lh=el("div","lane-head");
      var ic=el("div","lane-ic"); ic.style.background=L.color; ic.textContent=L.icon;
      lh.appendChild(ic);
      lh.appendChild(el("div","lane-title",esc(L.title)));
      lh.appendChild(el("div","lane-count",st.done+"/"+st.total));
      lane.appendChild(lh);

      var lb=el("div","lane-body");
      if(laneTasks.length===0){
        lb.appendChild(el("div","lane-empty","No tasks in this lane"));
      } else {
        laneTasks.forEach(function(t){ lb.appendChild(buildTaskCard(h,t)); });
      }
      lane.appendChild(lb);
      lanes.appendChild(lane);
    });

    wrap.appendChild(lanes);
    center.appendChild(head);
    center.appendChild(wrap);
  }

  function buildPlanHead(h){
    var pct=readiness(h);
    var head=el("div","plan-head");

    var gauge=el("div","ph-gauge");
    gauge.innerHTML = ringSVG(pct,30,7,"g-prog").replace('class="track"','class="g-track"')
      + '<div class="g-center"><span class="g-num" id="gNum">'+pct+'%</span><span class="g-lbl">Ready</span></div>';

    var info=el("div","ph-info");
    var c=countByStatus(h);
    var blocked=c.blocked;
    var readyPill = pct>=85
      ? '<span class="pill ready"><span class="pi">✓</span>On track for Day 1</span>'
      : (blocked>0
          ? '<span class="pill warn"><span class="pi">⚠</span>'+blocked+' blocker'+(blocked>1?"s":"")+'</span>'
          : '<span class="pill"><span class="pi">⏳</span>In progress</span>');
    var startPill = h.startInDays<=7
      ? '<span class="pill soon"><span class="pi">🚀</span>Day-1 ready in '+h.startInDays+' day'+(h.startInDays===1?"":"s")+'</span>'
      : '<span class="pill"><span class="pi">📅</span>Day-1 ready in '+h.startInDays+' days</span>';

    info.innerHTML =
      '<div class="nm">'+esc(h.name)+'</div>'+
      '<div class="role">'+esc(h.role)+' · '+esc(h.team)+' team</div>'+
      '<div class="ph-meta">'+startPill+readyPill+
        '<span class="pill"><span class="pi">📋</span>'+h.tasks.length+' tasks across 5 teams</span>'+
      '</div>';

    var actions=el("div","ph-actions");
    actions.innerHTML =
      '<div class="tasks-summary"><b>'+c.done+'</b> done · <b>'+(c.progress+c.nudged)+'</b> active · <b>'+c.scheduled+'</b> scheduled'+
      (blocked>0?' · <b style="color:var(--red)">'+blocked+'</b> blocked':'')+'</div>';

    head.appendChild(gauge);
    head.appendChild(info);
    head.appendChild(actions);
    return head;
  }

  function buildTaskCard(h,t){
    var meta=STATUS[t.status]||STATUS.scheduled;
    var card=el("div","task "+meta.scls);
    card.dataset.id=t.id;
    var owner = OWNERS[t.lane];

    var checkSvg='<svg viewBox="0 0 24 24" fill="none"><path d="M5 12.5l4 4L19 6.5" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/></svg>';

    var html=''+
      '<div class="task-top">'+
        '<div class="check" title="Toggle complete">'+checkSvg+'</div>'+
        '<div class="task-name">'+esc(t.name)+'</div>'+
      '</div>';
    if(t.sub||owner){
      html+='<div class="task-sub">'+
        (owner?'<span class="owner"><span class="od"></span>'+esc(owner.split(" (")[0])+'</span>':'')+
        (t.sub?(owner?'<span>·</span>':'')+'<span>'+esc(t.sub)+'</span>':'')+
      '</div>';
    }
    html+='<span class="chip '+meta.cls+'"><span class="cd"></span>'+meta.label+'</span>';
    card.innerHTML=html;

    // nudge button for blocked / overdue
    if(t.status==="blocked"){
      var nb=el("button","nudge-btn","🔔 Send nudge");
      nb.addEventListener("click",function(ev){
        ev.stopPropagation();
        sendNudge(h,t,card);
      });
      card.appendChild(nb);
    }

    // click toggles complete (but not when the status is blocked — nudge first)
    card.addEventListener("click",function(){
      toggleTask(h,t,card);
    });

    return card;
  }

  /* ---------- INTERACTION A: toggle complete ---------- */
  function toggleTask(h,t,card){
    if(t.status==="blocked"){
      // gentle hint — blocked needs a nudge first
      toast("⛔","This task is blocked","Send a nudge to its owner to unblock it.");
      if(card){ card.style.transition="transform .12s"; card.style.transform="translateX(3px)";
        setTimeout(function(){ card.style.transform=""; },130); }
      return;
    }
    if(t.status==="done"){
      // un-complete back to a sensible active state
      t.status="progress";
    } else {
      t.status="done";
      if(card){ card.classList.add("burst"); setTimeout(function(){ card.classList.remove("burst"); },450); }
    }
    refreshAfterChange(h);
  }

  /* ---------- INTERACTION B: send nudge ---------- */
  function sendNudge(h,t,card){
    var owner = OWNERS[t.lane] || "the owning team";
    t.status="nudged";
    toast("📨","Reminder sent to "+owner.split(" (")[0],"“"+t.name+"” for "+h.name);
    refreshAfterChange(h);
  }

  /* re-render center + update left ring after any change */
  function refreshAfterChange(h){
    // animate the gauge number softly
    renderCenter(false);
    updateHireRing(h);
  }

  /* ============ EMPTY STATE + GENERATE ============ */
  function renderEmptyState(center,h){
    center.innerHTML="";
    var head=el("div","plan-head");
    head.innerHTML=
      '<div class="ph-gauge">'+ringSVG(0,30,7,"g-prog").replace('class="track"','class="g-track"')+

      '<div class="ph-info">'+
        '<div class="nm">'+esc(h.name)+'</div>'+
        '<div class="role">'+esc(h.role)+' · '+esc(h.team)+' team</div>'+
        '<div class="ph-meta">'+
          '<span class="pill warn"><span class="pi">⚠</span>No onboarding plan yet</span>'+
          '<span class="pill soon"><span class="pi">🚀</span>Starts in '+h.startInDays+' days</span>'+
        '</div>'+
      '</div>'+
      '<div class="ph-actions"><button class="header-gen" id="headerGen">✨ Generate plan</button></div>';

    var es=el("div","empty-state fade-swap");
    es.innerHTML=
      '<div class="ico">✨</div>'+
      '<h3>No onboarding plan yet</h3>'+
      '<p>'+esc(h.name)+' starts in '+h.startInDays+' days. Generate a coordinated Day&nbsp;0–90 plan and the Orchestrator will assign tasks across IT, Payroll, Manager, Facilities &amp; People automatically.</p>'+
      '<button class="gen-btn" id="genBtn"><span class="sp"></span><span class="spark">✨</span><span>Generate onboarding plan</span></button>';

    center.appendChild(head);
    center.appendChild(es);

    var go=function(){ generatePlan(h); };
    var gb=document.getElementById("genBtn"); if(gb) gb.addEventListener("click",go);
    var hg=document.getElementById("headerGen"); if(hg) hg.addEventListener("click",go);
  }

  var _generating=false;
  function generatePlan(h){
    if(_generating || h.tasks.length>0) return;
    _generating=true;
    var gb=document.getElementById("genBtn");
    var hg=document.getElementById("headerGen");
    if(gb){ gb.classList.add("busy"); gb.querySelector("span:last-child").textContent="Generating plan…"; }
    if(hg){ hg.textContent="Generating…"; hg.style.pointerEvents="none"; hg.style.opacity=".8"; }

    // Build a fresh plan tailored a bit to a CSM
    var plan=[
      T("it","Provision laptop & peripherals","scheduled","MacBook Air + headset"),
      T("it","Create accounts + email","scheduled","Okta · Google Workspace"),
      T("it","Grant CRM & support-tool access","scheduled","Salesforce · Zendesk"),
      T("it","Set up 2FA / security keys","scheduled","Key to be ordered"),
      T("payroll","Collect I-9 / E-Verify","scheduled","Pre-start packet"),
      T("payroll","Set up direct deposit","scheduled","Form to send"),
      T("payroll","Federal & state tax forms","scheduled","W-4 + state"),
      T("payroll","Add to payroll system","scheduled","After tax forms"),
      T("manager","Draft 30-60-90 day plan","scheduled","Owner: hiring manager"),
      T("manager","Assign onboarding buddy","scheduled","Select peer mentor"),
      T("manager","Schedule week-1 1:1s","scheduled","Calendar holds"),
      T("manager","Add to team standup & channels","scheduled","#customer-success"),
      T("facilities","Issue building badge","scheduled","Request photo"),
      T("facilities","Assign desk & equipment","scheduled","Desk TBD"),
      T("facilities","Parking / transit pass","scheduled","Permit request"),
      T("people","Send welcome email & Day-1 agenda","scheduled","Schedule 3 days out"),
      T("people","Benefits enrollment invite","scheduled","Opens Day 1"),
      T("people","Complete new-hire paperwork","scheduled","Handbook + policies"),
      T("people","Schedule HR orientation","scheduled","Day 1 · 9:00 AM"),
      T("people","CSM enablement onboarding","scheduled","Product + playbooks")
    ];

    // simulate a brief "thinking" then render skeleton lanes and fly tasks in
    setTimeout(function(){
      h.tasks=plan;
      _generating=false;
      renderCenterForGeneration(h);
      updateHireRing(h);
      // update left subtitle
      var ls=document.getElementById("leftSub"); if(ls) ls.textContent="5 starting soon · all plans active";
      toast("✨","Onboarding plan generated","20 tasks assigned across 5 teams for "+h.name);
    }, 850);
  }

  /* render center but with task cards staggered fly-in */
  function renderCenterForGeneration(h){
    var center=document.getElementById("center");
    if(!center) return;
    center.innerHTML="";
    var head=buildPlanHead(h);
    var wrap=el("div","lanes-wrap");
    var lanes=el("div","lanes");
    var allCards=[];

    LANES.forEach(function(L){
      var laneTasks=h.tasks.filter(function(t){return t.lane===L.key;});
      var lane=el("div","lane");
      var st=laneStats(h,L.key);
      var lh=el("div","lane-head");
      var ic=el("div","lane-ic"); ic.style.background=L.color; ic.textContent=L.icon;
      lh.appendChild(ic);
      lh.appendChild(el("div","lane-title",esc(L.title)));
      lh.appendChild(el("div","lane-count",st.done+"/"+st.total));
      lane.appendChild(lh);
      var lb=el("div","lane-body");
      laneTasks.forEach(function(t){
        var card=buildTaskCard(h,t);
        card.classList.add("fly");
        lb.appendChild(card);
        allCards.push(card);
      });
      lane.appendChild(lb);
      lanes.appendChild(lane);
    });
    wrap.appendChild(lanes);
    center.appendChild(head);
    center.appendChild(wrap);

    // stagger reveal
    allCards.forEach(function(card,i){
      setTimeout(function(){
        card.classList.add("fly-in");
      }, 60 + i*55);
    });
  }

  /* ============ TOASTS ============ */
  function toast(icon,title,sub){
    var wrap=document.getElementById("toasts");
    if(!wrap) return;
    var t=el("div","toast");
    t.innerHTML='<div class="ti">'+icon+'</div><div class="tx"><b>'+esc(title)+'</b>'+(sub?'<div class="sm">'+esc(sub)+'</div>':'')+'</div>';
    wrap.appendChild(t);
    // force layout then show
    void t.offsetWidth;
    setTimeout(function(){ t.classList.add("show"); },10);
    setTimeout(function(){
      t.classList.remove("show");
      setTimeout(function(){ if(t.parentNode) t.parentNode.removeChild(t); },350);
    }, 3400);
  }

  /* ============ BOOT ============ */
  function boot(){
    try{
      renderHires();
      renderCenter(false);
    }catch(err){
      // defensive: never throw uncaught
      var c=document.getElementById("center");
      if(c) c.innerHTML='<div style="padding:40px;color:#6b7794">Something went wrong rendering the demo.</div>';
      if(window.console&&console.error) console.error(err);
    }
  }

  if(document.readyState==="loading"){
    document.addEventListener("DOMContentLoaded",boot);
  }else{
    boot();
  }
})();
</script>
</body>
</html>
